<!-- js for slideVars -->
<script type="module">
  import { slideVars } from "https://esm.sh/@codepen/slidevars";

  slideVars.init({
    "--pos": {
      type: "slider",
      min: 0,
      max: 720,
      default: 0,
      unit: ""
    },
    "--rotate": {
      type: "slider",
      min: -180,
      max: 180,
      default: 30,
      unit: "deg"
    },
    "--tilt": {
      type: "slider",
      min: 0,
      max: 40,
      default: 15,
      unit: "deg"
    }
  },{
    auto: false,
    defaultOpen: true
  });
</script>
