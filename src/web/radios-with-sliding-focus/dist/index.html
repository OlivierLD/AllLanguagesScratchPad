<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Radios With Sliding Focus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=DM+Sans&amp;display=swap'>
    <link rel="stylesheet" href="./style.css">
  </head>
    
  <body>
  <main>
	<form>
		<label>
			<input type="radio" name="inventor" value="bell" checked>
			<span class="truncate">Alexander Graham Bell</span>
		</label>
		<label>
			<input type="radio" name="inventor" value="morse">
			<span class="truncate">Samuel Morse</span>
		</label>
		<label>
			<input type="radio" name="inventor" value="edison">
			<span class="truncate">Thomas Edison</span>
		</label>
		<div class="selection"></div>
	</form>
  </main>
  </body>
  
</html>
